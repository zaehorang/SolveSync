<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolveSync</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="glass-shell">
        <header class="page-header">
          <p class="eyebrow" data-i18n="options.page.eyebrow"></p>
          <h1 id="options-title" data-i18n="options.page.title"></h1>
          <p class="lede" data-i18n="options.page.lede"></p>
        </header>

        <form id="options-form" class="settings-form" novalidate>
          <section class="panel setup-panel" aria-labelledby="github-title">
            <div class="section-heading">
              <div>
                <h2 id="github-title" data-i18n="options.section.github.title"></h2>
                <p class="section-copy" data-i18n="options.section.github.copy"></p>
              </div>
            </div>

            <div class="setup-flow">
              <div class="setup-step" data-setup-step="pat">
                <span class="setup-step-marker" aria-hidden="true">1</span>
                <div class="setup-step-header">
                  <div class="setup-step-title-row">
                    <h3 class="setup-step-title" data-i18n="options.setup.pat.title"></h3>
                    <span class="setup-step-state" data-setup-step-state-label></span>
                  </div>
                </div>

                <div class="setup-step-body">
                  <div class="field">
                    <label for="github-pat" data-i18n="options.field.githubPat"></label>
                    <div class="input-action-row">
                      <input
                        id="github-pat"
                        type="password"
                        autocomplete="off"
                        spellcheck="false"
                        data-i18n-placeholder="options.field.githubPatPlaceholder"
                      />
                      <button id="toggle-pat" class="button secondary" type="button"></button>
                    </div>
                    <p id="pat-error" class="field-message" aria-live="polite"></p>
                  </div>

                  <div class="checklist-block compact-checklist" aria-labelledby="pat-checklist-title">
                    <h3 id="pat-checklist-title" data-i18n="options.patChecklist.title"></h3>
                    <ul class="checklist compact">
                      <li data-i18n="options.patChecklist.create"></li>
                      <li data-i18n="options.patChecklist.target"></li>
                      <li data-i18n="options.patChecklist.contents"></li>
                      <li data-i18n="options.patChecklist.metadata"></li>
                      <li data-i18n="options.patChecklist.expiration"></li>
                    </ul>
                  </div>
                </div>
              </div>

              <div class="setup-step" data-setup-step="repository">
                <span class="setup-step-marker" aria-hidden="true">2</span>
                <div class="setup-step-header setup-step-header-action">
                  <div>
                    <div class="setup-step-title-row">
                      <h3 id="repository-title" class="setup-step-title" data-i18n="options.setup.repository.title"></h3>
                      <span class="setup-step-state" data-setup-step-state-label></span>
                    </div>
                    <p class="section-copy" data-i18n="options.repository.copy"></p>
                  </div>
                  <button id="load-repositories" class="button secondary" type="button"></button>
                </div>

                <div class="setup-step-body">
                  <div class="field">
                    <label for="repository-search" data-i18n="options.field.repositorySearch"></label>
                    <input
                      id="repository-search"
                      type="search"
                      autocomplete="off"
                      data-i18n-placeholder="options.field.repositorySearchPlaceholder"
                    />
                  </div>

                  <div class="field">
                    <label for="repository-select" data-i18n="options.field.repositoryList"></label>
                    <select id="repository-select" size="6"></select>
                    <p id="repository-status" class="field-message" aria-live="polite"></p>
                  </div>
                </div>
              </div>

              <div class="setup-step" data-setup-step="branch">
                <span class="setup-step-marker" aria-hidden="true">3</span>
                <div class="setup-step-header">
                  <div class="setup-step-title-row">
                    <h3 class="setup-step-title" data-i18n="options.setup.branch.title"></h3>
                    <span class="setup-step-state" data-setup-step-state-label></span>
                  </div>
                </div>

                <div class="setup-step-body branch-controls">
                  <div class="field">
                    <label for="branch-select" data-i18n="options.field.branchSelect"></label>
                    <p class="section-copy" data-i18n="options.branch.copy"></p>
                    <select id="branch-select" disabled></select>
                    <p id="branch-status" class="field-message" aria-live="polite"></p>
                  </div>

                  <div class="field">
                    <label for="create-branch-name" data-i18n="options.field.createBranch"></label>
                    <p class="section-copy" data-i18n="options.createBranch.copy"></p>
                    <div class="input-action-row">
                      <input
                        id="create-branch-name"
                        type="text"
                        autocomplete="off"
                        data-i18n-placeholder="options.field.createBranchPlaceholder"
                        disabled
                      />
                      <button id="create-branch" class="button secondary" type="button" disabled></button>
                    </div>
                    <p id="create-branch-status" class="field-message" aria-live="polite"></p>
                  </div>
                </div>
              </div>

              <div class="setup-step connection-test" data-setup-step="connection" aria-labelledby="connection-test-title">
                <span class="setup-step-marker" aria-hidden="true">4</span>
                <div class="setup-step-header setup-step-header-action">
                  <div>
                    <div class="setup-step-title-row">
                      <h3 id="connection-test-title" class="setup-step-title" data-i18n="options.setup.connection.title"></h3>
                      <span class="setup-step-state" data-setup-step-state-label></span>
                    </div>
                    <p class="section-copy" data-i18n="options.connectionTest.copy"></p>
                  </div>
                  <button id="test-connection" class="button primary" type="button"></button>
                </div>
                <div class="setup-step-body">
                  <div id="connection-status" class="status-box neutral" aria-live="polite"></div>
                </div>
              </div>
            </div>
          </section>

          <section class="panel" aria-labelledby="general-title">
            <div class="section-heading">
              <div>
                <h2 id="general-title" data-i18n="options.section.general.title"></h2>
                <p class="section-copy" data-i18n="options.section.general.copy"></p>
              </div>
              <p id="options-status" class="status-text" aria-live="polite"></p>
            </div>

            <div class="settings-row compact-row">
              <label class="switch-row" for="auto-sync-enabled">
                <input id="auto-sync-enabled" type="checkbox" />
                <span class="switch-control" aria-hidden="true"></span>
                <span>
                  <strong data-i18n="options.autoSync.title"></strong>
                  <small data-i18n="options.autoSync.detail"></small>
                </span>
              </label>
            </div>

            <div class="settings-row">
              <div class="field">
                <label id="language-label" data-i18n="options.field.language"></label>
                <div
                  class="segmented-control"
                  role="group"
                  aria-labelledby="language-label"
                >
                  <button
                    class="segment-option"
                    type="button"
                    data-language-option="system"
                    data-i18n="language.system"
                  ></button>
                  <button
                    class="segment-option"
                    type="button"
                    data-language-option="en"
                    data-i18n="language.en"
                  ></button>
                  <button
                    class="segment-option"
                    type="button"
                    data-language-option="ko"
                    data-i18n="language.ko"
                  ></button>
                </div>
              </div>
            </div>
          </section>

          <section class="panel" aria-labelledby="security-title">
            <h2 id="security-title" data-i18n="options.section.security.title"></h2>
            <ul class="disclosure-list">
              <li data-i18n="options.security.patStorage"></li>
              <li data-i18n="options.security.retryStorage"></li>
              <li data-i18n="options.security.retryLimit"></li>
              <li data-i18n="options.security.noBackend"></li>
              <li data-i18n="options.security.solutionTransfer"></li>
              <li data-i18n="options.security.noProblemStatement"></li>
            </ul>
          </section>

          <section class="panel" aria-labelledby="about-title">
            <h2 id="about-title" data-i18n="options.section.about.title"></h2>
            <p class="section-copy" data-i18n="options.about.product"></p>
            <p class="section-copy" data-i18n="options.about.scope"></p>
          </section>

          <section class="action-panel" aria-labelledby="save-title">
            <h2 id="save-title" class="visually-hidden" data-i18n="options.section.save.title"></h2>
            <div class="action-panel-inner">
              <p id="save-status" class="status-text" aria-live="polite"></p>
              <button id="save-settings" class="button primary" type="submit"></button>
            </div>
          </section>
        </form>
      </div>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
