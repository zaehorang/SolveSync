<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">SolveSync 정답 풀이 동기화 흐름</title>
  <desc id="desc">정답 처리된 문제 풀이, SolveSync 성공 토스트, 자동 커밋을 보여주는 시각 자료입니다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.56" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" y1="92" x2="1070" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <linearGradient id="repo" x1="905" y1="254" x2="1085" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="0" fill="url(#bg)"/>

  <g transform="translate(74 56)">
    <rect x="0" y="0" width="84" height="84" rx="22" fill="#dbeafe"/>
    <path d="M59 28c10 5 15 16 12 27-2 11-11 19-22 21" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M26 57c-9-4-14-14-12-25 2-10 10-18 20-20" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.24"/>
    <path d="M22 43h10l5-7h17l5 7h8v20c0 4-3 7-7 7H29c-4 0-7-3-7-7V43Z" fill="#172554"/>
    <rect x="31" y="24" width="28" height="33" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <path d="M38 43l7 7 13-17" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="184" y="95" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="800" letter-spacing="0">SolveSync</text>
  <text x="184" y="132" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500" letter-spacing="0">정답 풀이를 선택한 저장소로 자동 동기화</text>

  <g filter="url(#shadow)">
    <rect x="78" y="188" width="500" height="352" rx="18" fill="url(#panel)" stroke="#dbe4f0"/>
    <rect x="78" y="188" width="500" height="54" rx="18" fill="#0f172a"/>
    <path d="M78 224h500" stroke="#0f172a" stroke-width="36"/>
    <circle cx="108" cy="215" r="7" fill="#fb7185"/>
    <circle cx="132" cy="215" r="7" fill="#facc15"/>
    <circle cx="156" cy="215" r="7" fill="#34d399"/>
    <text x="192" y="224" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">문제 풀이 화면</text>

    <text x="116" y="294" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="760">두 수의 합</text>
    <rect x="116" y="316" width="108" height="34" rx="17" fill="#dcfce7"/>
    <circle cx="139" cy="333" r="8" fill="#16a34a"/>
    <path d="M135 333l3 3 6-8" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="156" y="340" fill="#166534" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">정답</text>

    <rect x="116" y="382" width="420" height="112" rx="14" fill="#0b1220"/>
    <text x="140" y="420" fill="#93c5fd" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">풀이 코드</text>
    <text x="164" y="450" fill="#e2e8f0" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">입력: 숫자 배열, 목표값</text>
    <text x="164" y="480" fill="#86efac" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="17">출력: 두 인덱스</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="454" y="264" width="338" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="478" y="291" width="54" height="54" rx="14" fill="#dcfce7"/>
    <path d="M493 318l9 9 18-24" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="552" y="314" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="780">저장소에 동기화됨</text>
    <text x="552" y="342" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="560">커밋과 파일 준비 완료</text>
    <rect x="552" y="360" width="90" height="1.5" rx="1" fill="#2563eb"/>
  </g>

  <path d="M604 366C675 436 750 446 842 386" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M841 386l-26-1 12 23" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="802" y="188" width="402" height="352" rx="18" fill="#ffffff" stroke="#dbe4f0"/>
    <rect x="802" y="188" width="402" height="54" rx="18" fill="#f8fafc"/>
    <path d="M802 224h402" stroke="#f8fafc" stroke-width="36"/>
    <circle cx="832" cy="215" r="7" fill="#64748b"/>
    <circle cx="856" cy="215" r="7" fill="#64748b"/>
    <circle cx="880" cy="215" r="7" fill="#64748b"/>
    <text x="916" y="224" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="660">선택한 풀이 저장소</text>

    <path d="M852 292h84l26-31h113l26 31h54v146c0 28-22 50-50 50H902c-28 0-50-22-50-50V292Z" fill="url(#repo)"/>
    <path d="M868 300h75l27-31h98l27 31h45" fill="none" stroke="#bfdbfe" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="900" y="332" width="210" height="92" rx="12" fill="#ffffff" opacity="0.96"/>
    <path d="M926 366h68" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
    <path d="M926 394h144" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
    <path d="M1030 362l16 16 34-42" fill="none" stroke="#16a34a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="860" y="448" width="282" height="42" rx="21" fill="#eff6ff"/>
    <text x="894" y="476" fill="#1d4ed8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="760">풀이 커밋 자동 생성</text>
  </g>

  <text x="85" y="594" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="560">평소처럼 문제를 풀면 됩니다. 정답이 감지되면 확장 프로그램이 풀이, 리드미, 카탈로그를 선택한 저장소에 커밋합니다.</text>
</svg>
